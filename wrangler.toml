name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "mailfree-db" #你的d1数据库名称
database_id = "ce549aec-fe74-4608-acfa-b98a8e5f1047" # 你的database_id
# 登录会话过期时间（单位：天，默认365天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="jackzzs"
ADMIN_PASSWORD="81010zzs"
GUEST_PASSWORD="guest"
JWT_TOKEN="Ds32XXf1G4JFpTVc"
JWT_TOKENGUEST_PASSWORD="YRIdX115xaDtTdSY"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="zetxm1.eu.cc"
RESEND_API_KEY="re_Zw9Nf5k8_Mj59TXS9AguoiNBTAe4hcdsq"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mailfree-r2"

